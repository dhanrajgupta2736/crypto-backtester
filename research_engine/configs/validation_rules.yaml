# QRP Framework v2.0 Configuration Validation Rules

validation_gates:
  schema:
    require_keys_candidate:
      - "candidate.metadata.id"
      - "candidate.metadata.name"
      - "candidate.plugin.module_path"
      - "candidate.universe.symbols"
      - "candidate.timeframes"
    require_keys_experiment:
      - "experiment_sweep.candidate_id"
      - "experiment_sweep.parameter_space"

  timeframes:
    supported:
      - "15m"
      - "30m"
      - "1H"
      - "4H"
      - "1D"

  asset_classes:
    supported:
      - "crypto"
      - "equity"
      - "commodity"

  parameter_bounds:
    lookback_window:
      min: 1
      max: 1000
    portfolio_size_k:
      min: 1
      max: 50
    rebalance_frequency_r:
      min: 1
      max: 168
    stop_loss_multiplier:
      min: 0.1
      max: 20.0
    take_profit_multiplier:
      min: 0.1
      max: 999.0

  rules:
    - name: "Portfolio Size Constraints"
      description: "Portfolio size K must not exceed the total symbols in the asset universe."
      check_type: "RELATIVE_BOUND"
      left_key: "candidate.portfolio.max_active_positions"
      right_key: "candidate.universe.symbols"
      comparison: "LE"
      
    - name: "Framework Version Verification"
      description: "Candidate framework target version must match the running engine framework version."
      check_type: "STRING_MATCH"
      target_key: "candidate.metadata.framework_version"
      current_value: "QRP Framework v2.0"
      comparison: "EQUALS"

    - name: "Output Path Security"
      description: "Output paths must remain inside the user workspace and must not traverse parent directories."
      check_type: "PATH_SECURITY"
      restricted_strings:
        - ".."
        - "/"
        - "\\"
